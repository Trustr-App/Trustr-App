<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trustr</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    :root {
      --grad-top:    #FFAA6B;
      --grad-bot:    #FF5C5C;
      --teal:        #5BA8A0;
      --teal-dark:   #4A9490;
      --teal-light:  #E0F2F1;
      --purple:      #3C0060;
      --purple-mid:  #6B0FA0;
      --danger:      #D93030;
      --danger-light:#FDEAEA;
      --success:     #2E9E6B;
      --success-light:#E0F5EC;
      --warning:     #C97A00;
      --warning-light:#FFF3DC;
      --card:        #F0EEEE;
      --card-border: rgba(0,0,0,0.07);
      --text:        #111111;
      --text-sub:    #555;
      --hdr-h:       64px;
      --tab-h:       48px;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(170deg, var(--grad-top) 0%, var(--grad-bot) 100%);
      background-attachment: fixed;
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────── */
    .header {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; height: var(--hdr-h);
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    .logo-wrap { display:flex; align-items:center; gap:8px; }
    .logo-shield {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #FF8C00, #FF4444);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; box-shadow: 0 2px 6px rgba(255,100,0,0.35);
    }
    .logo-text {
      font-size: 20px; font-weight: 900; letter-spacing: 1px;
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-mid) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right { display:flex; align-items:center; gap:8px; }

    .user-switcher {
      display:flex; background:#EDEDED; border-radius:20px; padding:3px; gap:2px;
    }
    .user-btn {
      padding: 4px 10px; border-radius:16px; border:none;
      background:transparent; font-size:12px; font-weight:700;
      color:#777; cursor:pointer; transition:all 0.2s; font-family:inherit;
    }
    .user-btn.active { background:var(--teal); color:white; }

    /* ── TAB BAR ─────────────────────────────────── */
    .tab-bar {
      position: fixed; top: var(--hdr-h); left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; height: var(--tab-h);
      background: rgba(200,190,190,0.55);
      backdrop-filter: blur(6px);
      display: flex; align-items: center;
      padding: 6px 10px; gap: 6px;
      z-index: 99; overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display:none; }

    .tab-pill {
      flex-shrink: 0; padding: 6px 14px;
      border-radius: 20px; border: none;
      background: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.9);
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      font-family: inherit;
    }
    .tab-pill.active {
      background: rgba(255,255,255,0.95);
      color: var(--purple);
    }
    .tab-pill .pill-badge {
      display:inline-flex; align-items:center; justify-content:center;
      background: var(--danger); color:white;
      font-size:10px; font-weight:800;
      width:16px; height:16px; border-radius:50%;
      margin-left:4px; vertical-align:middle;
    }

    /* ── CONTENT ─────────────────────────────────── */
    .content {
      padding-top: calc(var(--hdr-h) + var(--tab-h) + 16px);
      padding-bottom: 28px;
      padding-left: 14px; padding-right: 14px;
      min-height: 100vh;
    }

    /* ── SCREENS ─────────────────────────────────── */
    .screen { display:none; }
    .screen.active { display:block; }

    /* ── SECTION TITLE ───────────────────────── */
    .section-title {
      font-size: 19px; font-weight: 900;
      color: var(--purple); margin-bottom: 14px;
      text-shadow: 0 1px 2px rgba(255,255,255,0.4);
    }

    /* ── CARDS ───────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: 16px; padding: 14px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.13);
      margin-bottom: 12px;
      border: 1px solid var(--card-border);
    }

    /* ── STATUS BADGES ───────────────────────────── */
    .badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;
    }
    .b-requested      { background:var(--warning-light); color:var(--warning); }
    .b-active         { background:var(--success-light);  color:var(--success); }
    .b-pending_return { background:var(--teal-light);     color:var(--teal-dark); }
    .b-returned       { background:#EBEBEB;               color:#555; }
    .b-late           { background:var(--danger-light);   color:var(--danger); }
    .b-lost           { background:#1F2937;               color:white; }

    /* ── BUTTONS ─────────────────────────────────── */
    .btn {
      padding: 11px 16px; border-radius: 25px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.15s; display:inline-flex; align-items:center;
      justify-content:center; gap:6px; font-family:inherit;
    }
    .btn:active { transform:scale(0.96); opacity:0.9; }
    .btn-primary { background:var(--teal);    color:white; }
    .btn-success { background:var(--teal);    color:white; }
    .btn-danger  { background:var(--danger);  color:white; }
    .btn-outline { background:transparent; color:var(--teal); border:2px solid var(--teal); }
    .btn-ghost   { background:rgba(255,255,255,0.6); color:var(--text); }
    .btn-full    { width:100%; }
    .btn-sm      { padding:7px 14px; font-size:13px; }

    /* ── FORM ────────────────────────────────────── */
    .form-group { margin-bottom:14px; }
    .form-label { font-size:12px; font-weight:700; color:var(--text-sub); margin-bottom:6px; display:block; text-transform:uppercase; letter-spacing:.4px; }
    .form-input {
      width:100%; padding:11px 14px;
      border:1.5px solid rgba(0,0,0,0.12); border-radius:12px;
      font-size:15px; outline:none; transition:border-color 0.2s;
      font-family:inherit; color:var(--text); background:white;
    }
    .form-input:focus { border-color:var(--teal); }

    /* ── INNER TABS ─────────────────────────────── */
    .inner-tabs {
      display:flex; gap:0; margin-bottom:16px;
      background:rgba(0,0,0,0.12); border-radius:14px; padding:3px;
    }
    .inner-tab {
      flex:1; padding:8px; text-align:center; border:none;
      background:transparent; border-radius:11px;
      font-size:13px; font-weight:700; color:rgba(255,255,255,0.7);
      cursor:pointer; transition:all 0.2s; font-family:inherit;
    }
    .inner-tab.active { background:white; color:var(--purple); box-shadow:0 1px 4px rgba(0,0,0,0.15); }

    /* ── INFO ROWS ───────────────────────────────── */
    .info-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:7px 0; font-size:13px; border-bottom:1px solid rgba(0,0,0,0.06);
    }
    .info-row:last-child { border-bottom:none; }
    .info-label { color:var(--text-sub); }
    .info-value { font-weight:700; text-align:right; max-width:60%; }

    /* ── DIVIDER ─────────────────────────────────── */
    .divider { height:1px; background:rgba(0,0,0,0.08); margin:12px 0; }

    /* ── EMPTY STATE ─────────────────────────────── */
    .empty-state { text-align:center; padding:48px 24px; }
    .empty-icon  { font-size:52px; margin-bottom:12px; }
    .empty-state p { font-size:15px; font-weight:600; color:rgba(255,255,255,0.85); }

    /* ── ITEM ROW ────────────────────────────────── */
    .item-row { display:flex; align-items:center; gap:12px; }
    .item-emoji {
      font-size:28px; width:50px; height:50px;
      background:rgba(91,168,160,0.15); border-radius:13px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .item-name { font-size:15px; font-weight:800; margin-bottom:2px; color:var(--text); }
    .item-meta { font-size:12px; color:var(--text-sub); margin-top:1px; }

    /* ── STATS GRID ──────────────────────────────── */
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .stat-card  { border-radius:14px; padding:14px; text-align:center; background:var(--card); box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .stat-number { font-size:28px; font-weight:900; color:var(--purple); }
    .stat-label  { font-size:11px; color:var(--text-sub); margin-top:3px; font-weight:700; text-transform:uppercase; letter-spacing:.3px; }

    /* ── DUE CHIP ────────────────────────────────── */
    .due-chip { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:10px; }
    .due-ok   { background:var(--success-light); color:var(--success); }
    .due-soon { background:var(--warning-light);  color:var(--warning); }
    .due-over { background:var(--danger-light);   color:var(--danger); }

    /* ── FLOW STEPS ──────────────────────────────── */
    .flow-steps { display:flex; align-items:flex-start; margin:4px 0 10px; }
    .flow-step  { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
    .flow-dot {
      width:26px; height:26px; border-radius:50%;
      background:#DDD; color:#888;
      font-size:10px; font-weight:800;
      display:flex; align-items:center; justify-content:center; z-index:1;
    }
    .flow-dot.done    { background:var(--teal);  color:white; font-size:13px; }
    .flow-dot.current { background:var(--purple); color:white; }
    .flow-dot.late    { background:var(--danger); color:white; font-size:13px; }
    .flow-dot.lost    { background:#1F2937;       color:white; font-size:13px; }
    .flow-line { flex:1; height:2px; background:#DDD; margin-top:12px; }
    .flow-line.done   { background:var(--teal); }
    .flow-label { font-size:9px; color:#888; font-weight:700; text-align:center; line-height:1.2; }
    .flow-label.active-label { color:var(--purple); font-weight:900; }
    .flow-label.done-label   { color:var(--teal); }

    /* ── MODAL ───────────────────────────────────── */
    .modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.5); z-index:200;
      align-items:flex-end; justify-content:center;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:white; border-radius:24px 24px 0 0;
      padding:8px 18px 28px; width:100%; max-width:430px;
      max-height:88vh; overflow-y:auto;
    }
    .modal-handle { width:40px; height:4px; background:#DDD; border-radius:2px; margin:12px auto 18px; }
    .modal-title  { font-size:19px; font-weight:900; color:var(--purple); margin-bottom:16px; }

    /* ── TOAST ───────────────────────────────────── */
    .toast {
      position:fixed; bottom:24px;
      left:50%; transform:translateX(-50%) translateY(12px);
      background:#1F2937; color:white; padding:11px 20px;
      border-radius:25px; font-size:14px; font-weight:700;
      z-index:300; opacity:0; transition:all 0.28s;
      white-space:nowrap; pointer-events:none;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── PROFILE AVATAR ──────────────────────────── */
    .avatar-wrap {
      text-align:center; padding:24px 16px 18px;
    }
    .avatar-emoji { font-size:72px; display:block; margin-bottom:8px; }
    .avatar-name  { font-size:22px; font-weight:900; color:var(--purple); }
    .avatar-sub   { color:var(--text-sub); font-size:13px; font-weight:600; margin-top:4px; }

    /* ── FRIEND ROW ──────────────────────────────── */
    .friend-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid rgba(0,0,0,0.07); }
    .friend-row:last-child { border-bottom:none; }
    .friend-avatar { font-size:32px; width:48px; height:48px; display:flex; align-items:center; justify-content:center; background:rgba(91,168,160,0.15); border-radius:12px; }
    .friend-info { flex:1; }
    .friend-name { font-weight:800; font-size:14px; color:var(--text); }
    .friend-status { font-size:12px; color:var(--text-sub); margin-top:2px; }

    /* ── CHAT STYLES ──────────────────────────────── */
    .chat-container { display:flex; flex-direction:column; height:60vh; background:white; border-radius:16px; overflow:hidden; }
    .chat-messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:8px; }
    .message { display:flex; gap:8px; margin-bottom:8px; }
    .message.sent { justify-content:flex-end; }
    .message.sent .msg-bubble { background:var(--teal); color:white; }
    .message.received .msg-bubble { background:#EBEBEB; color:var(--text); }
    .msg-bubble { max-width:75%; padding:10px 14px; border-radius:12px; font-size:13px; word-wrap:break-word; line-height:1.4; }
    .msg-time { font-size:10px; color:var(--text-sub); margin-top:2px; text-align:right; }
    .chat-input { padding:12px; border-top:1px solid rgba(0,0,0,0.1); display:flex; gap:8px; }
    .chat-input input { flex:1; padding:8px 12px; border:1px solid rgba(0,0,0,0.15); border-radius:20px; font-size:13px; }
    .chat-input button { padding:8px 12px; background:var(--teal); color:white; border:none; border-radius:20px; cursor:pointer; font-weight:700; font-size:12px; }

    /* ── BORROW REQUEST MODAL ────────────────────── */
    .photo-box {
      background:rgba(255,255,255,0.5); border-radius:13px; padding:20px 16px;
      text-align:center; color:#555; cursor:pointer;
      border:2px dashed rgba(0,0,0,0.18); transition:all 0.2s;
    }
    .photo-box:hover { border-color:var(--teal); background:var(--teal-light); }
    .photo-box .photo-icon { font-size:34px; margin-bottom:6px; }
    .photo-box p { font-size:13px; font-weight:600; }

    /* ── STARS ───────────────────────────────────── */
    .star-row { display:flex; gap:5px; margin:6px 0 12px; }
    .star { font-size:26px; cursor:pointer; opacity:0.2; transition:opacity 0.15s, transform 0.1s; user-select:none; }
    .star.lit { opacity:1; }
    .star:active { transform:scale(1.3); }

    /* ── REP BAR ─────────────────────────────────── */
    .rep-row { margin-bottom:12px; }
    .rep-header { display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:5px; }
    .rep-bar { background:#E0E0E0; border-radius:8px; height:9px; overflow:hidden; }
    .rep-fill { height:100%; border-radius:8px; transition:width 0.6s ease; }

    /* ── REQUEST ACTIONS ────────────────────────── */
    .req-actions { display:flex; gap:8px; margin-top:12px; }
  </style>
</head>
<body>

<!-- ════════ HEADER ════════ -->
<div class="header">
  <div class="logo-wrap">
    <div class="logo-shield">🤝</div>
    <div class="logo-text">TRUSTR</div>
  </div>
  <div class="header-right">
    <div class="user-switcher">
      <button class="user-btn active" onclick="switchUser('alex')">👦 Alex</button>
      <button class="user-btn"        onclick="switchUser('jordan')">👧 Jordan</button>
    </div>
  </div>
</div>

<!-- ════════ TAB BAR ════════ -->
<div class="tab-bar">
  <button class="tab-pill active" id="nav-friends"  onclick="navigate('friends')">Friends</button>
  <button class="tab-pill"        id="nav-borrows"  onclick="navigate('borrows')">My Borrows</button>
  <button class="tab-pill"        id="nav-requests" onclick="navigate('requests')">Requests<span class="pill-badge" id="req-badge" style="display:none">0</span></button>
  <button class="tab-pill"        id="nav-profile"  onclick="navigate('profile')">Profile</button>
</div>

<!-- ════════ CONTENT ════════ -->
<div class="content">

  <!-- FRIENDS -->
  <div class="screen active" id="screen-friends">
    <div class="section-title">Friends 👥</div>
    <div class="inner-tabs">
      <button class="inner-tab active" id="tab-my-friends"   onclick="switchFriendsTab('my-friends')">My Friends</button>
      <button class="inner-tab"        id="tab-pending-req"  onclick="switchFriendsTab('pending-req')">Pending<span class="pill-badge" id="friend-req-badge" style="display:none;margin-left:2px">0</span></button>
    </div>
    <div id="friends-my-friends"></div>
    <div id="friends-pending-req" style="display:none"></div>
  </div>

  <!-- MY BORROWS -->
  <div class="screen" id="screen-borrows">
    <div class="section-title">My Borrows 📦</div>
    <div class="inner-tabs">
      <button class="inner-tab active" id="tab-active"   onclick="switchBorrowTab('active')">Active</button>
      <button class="inner-tab"        id="tab-history"  onclick="switchBorrowTab('history')">History</button>
    </div>
    <div id="borrows-active"></div>
    <div id="borrows-history" style="display:none"></div>
  </div>

  <!-- REQUESTS -->
  <div class="screen" id="screen-requests">
    <div class="section-title">Requests 📬</div>
    <div id="requests-list"></div>
  </div>

  <!-- PROFILE -->
  <div class="screen" id="screen-profile">
    <div id="profile-content"></div>
  </div>

</div>

<!-- ════════ MODAL: CHAT ════════ -->
<div class="modal-overlay" id="modal-chat">
  <div class="modal" style="padding:0;display:flex;flex-direction:column">
    <div style="padding:12px 18px;border-bottom:1px solid rgba(0,0,0,0.1)">
      <div class="modal-handle"></div>
      <div class="modal-title" id="chat-friend-name" style="margin-bottom:0"></div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input">
      <input type="text" id="chat-input-field" placeholder="Message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- ════════ MODAL: BORROW REQUEST ════════ -->
<div class="modal-overlay" id="modal-borrow">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Request to Borrow</div>
    <div id="modal-borrow-body"></div>
  </div>
</div>

<!-- ════════ MODAL: RETURN ════════ -->
<div class="modal-overlay" id="modal-return">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Send Return Request</div>
    <div id="modal-return-body"></div>
  </div>
</div>

<!-- ════════ TOAST ════════ -->
<div class="toast" id="toast"></div>

<script>
// ──────────────────────────────────────────────
//  DATA
// ──────────────────────────────────────────────

const USERS = {
  alex:   { id:'alex',   name:'Alex',   emoji:'👦' },
  jordan: { id:'jordan', name:'Jordan', emoji:'👧' }
};

const TODAY     = new Date('2026-06-10T00:00:00');
const TODAY_STR = '2026-06-10';

let currentUser = 'alex';

// Friendships
let friendships = {
  alex: {
    friends: ['jordan'],
    pendingIncoming: [],
    pendingOutgoing: []
  },
  jordan: {
    friends: ['alex'],
    pendingIncoming: [],
    pendingOutgoing: []
  }
};

// Chat messages between friends
let chats = {
  'alex-jordan': [
    { from:'jordan', text:'Hey, do you have a spare calculator?', time:'2026-06-09 14:30' },
    { from:'alex', text:'Yeah! I have one you can borrow', time:'2026-06-09 14:32' },
    { from:'jordan', text:'Great! Can I use it for a week?', time:'2026-06-09 14:33' }
  ]
};

// Items are ONLY created when a borrow request is made
let items = [];
let nextItemId = 1;

let transactions = [
  {
    id:1, itemId:1,
    borrower:'alex', lender:'jordan',
    itemName:'Noise-Cancelling Headphones',
    itemEmoji:'🎧',
    itemCondition:'Good',
    itemNotes:'Right ear-pad slightly worn',
    status:'active',
    requestedAt:'2026-06-08', startDate:'2026-06-09', dueDate:'2026-06-14',
    returnRequestAt:null, returnedAt:null,
    conditionRating:null, lenderNotes:'',
    borrowerNote:'Need it for finals week'
  },
  {
    id:2, itemId:2,
    borrower:'jordan', lender:'alex',
    itemName:'Ruler & Compass Set',
    itemEmoji:'📐',
    itemCondition:'Good',
    itemNotes:'',
    status:'returned',
    requestedAt:'2026-06-01', startDate:'2026-06-02', dueDate:'2026-06-07',
    returnRequestAt:'2026-06-06', returnedAt:'2026-06-07',
    conditionRating:5, lenderNotes:'Perfect condition, returned early!',
    borrowerNote:'Just for one project'
  }
];
let nextTxId = 3;

// ──────────────────────────────────────────────
//  HELPERS
// ──────────────────────────────────────────────

const $ = id => document.getElementById(id);

function toast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

function closeModal(id) { $(id).classList.remove('open'); }
function openModal(id)  { $(id).classList.add('open');    }

document.querySelectorAll('.modal-overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); })
);

function fmt(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function dueChip(dueDateStr) {
  const due  = new Date(dueDateStr + 'T23:59:59');
  const diff = Math.ceil((due - TODAY) / 864e5);
  if (diff < 0)   return `<span class="due-chip due-over">🔴 ${Math.abs(diff)}d overdue</span>`;
  if (diff === 0) return `<span class="due-chip due-soon">⚠️ Due today</span>`;
  if (diff <= 3)  return `<span class="due-chip due-soon">⚡ ${diff}d left</span>`;
  return              `<span class="due-chip due-ok">📅 ${diff}d left</span>`;
}

function isLate(tx) {
  const due = new Date(tx.dueDate + 'T23:59:59');
  if (!tx.returnRequestAt) return TODAY > due;
  return new Date(tx.returnRequestAt + 'T23:59:59') > due;
}

function getTx(id)   { return transactions.find(t => t.id === id); }

function pendingCount(userId) {
  return transactions.filter(tx =>
    tx.lender === userId &&
    (tx.status === 'requested' || tx.status === 'pending_return')
  ).length;
}

function pendingFriendRequests(userId) {
  return friendships[userId].pendingIncoming.length;
}

function updateBadges() {
  const n  = pendingCount(currentUser);
  const el = $('req-badge');
  el.textContent = n;
  el.style.display = n > 0 ? 'inline-flex' : 'none';

  const fr = pendingFriendRequests(currentUser);
  const el2 = $('friend-req-badge');
  el2.textContent = fr;
  el2.style.display = fr > 0 ? 'inline-flex' : 'none';
}

function emptyState(icon, msg) {
  return `<div class="empty-state"><div class="empty-icon">${icon}</div><p>${msg}</p></div>`;
}

// ──────────────────────────────────────────────
//  NAVIGATION
// ──────────────────────────────────────────────

let currentScreen = 'friends';

function navigate(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-pill').forEach(n => n.classList.remove('active'));
  $('screen-' + screen).classList.add('active');
  $('nav-'    + screen).classList.add('active');
  currentScreen = screen;
  render(screen);
}

function render(screen) {
  if (screen === 'friends')  renderFriends();
  if (screen === 'borrows')  renderBorrows();
  if (screen === 'requests') renderRequests();
  if (screen === 'profile')  renderProfile();
  updateBadges();
}

function switchUser(uid) {
  currentUser = uid;
  document.querySelectorAll('.user-btn').forEach((b, i) =>
    b.classList.toggle('active',
      (i === 0 && uid === 'alex') || (i === 1 && uid === 'jordan')
    )
  );
  render(currentScreen);
}

// ──────────────────────────────────────────────
//  FRIENDS SCREEN
// ──────────────────────────────────────────────

let friendsTab = 'my-friends';
let currentChatFriend = null;

function switchFriendsTab(tab) {
  friendsTab = tab;
  $('tab-my-friends').classList.toggle('active', tab==='my-friends');
  $('tab-pending-req').classList.toggle('active', tab==='pending-req');
  $('friends-my-friends').style.display  = tab==='my-friends'  ? 'block':'none';
  $('friends-pending-req').style.display = tab==='pending-req' ? 'block':'none';
}

function renderFriends() {
  const myFriends = friendships[currentUser].friends.map(id => USERS[id]);
  const pendingRequests = friendships[currentUser].pendingIncoming.map(id => USERS[id]);

  $('friends-my-friends').innerHTML = myFriends.length 
    ? myFriends.map(friend => `
        <div class="card">
          <div class="friend-row">
            <div class="friend-avatar">${friend.emoji}</div>
            <div class="friend-info">
              <div class="friend-name">${friend.name}</div>
              <div class="friend-status">✅ Friend</div>
            </div>
            <button class="btn btn-sm btn-primary" onclick="openChat('${friend.id}')">💬 Chat</button>
          </div>
        </div>
      `).join('')
    : emptyState('😔', 'No friends yet.');

  $('friends-pending-req').innerHTML = pendingRequests.length
    ? pendingRequests.map(friend => `
        <div class="card">
          <div class="friend-row">
            <div class="friend-avatar">${friend.emoji}</div>
            <div class="friend-info">
              <div class="friend-name">${friend.name}</div>
              <div class="friend-status">⏳ Pending request</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn btn-danger btn-sm" style="flex:1" onclick="respondFriendRequest('${friend.id}',false)">✕ Deny</button>
            <button class="btn btn-success btn-sm" style="flex:2" onclick="respondFriendRequest('${friend.id}',true)">✓ Accept</button>
          </div>
        </div>
      `).join('')
    : emptyState('🎉', 'No pending requests!');
}

function respondFriendRequest(userId, accept) {
  const idx = friendships[currentUser].pendingIncoming.indexOf(userId);
  if (idx === -1) return;
  friendships[currentUser].pendingIncoming.splice(idx, 1);

  if (accept) {
    friendships[currentUser].friends.push(userId);
    const idx2 = friendships[userId].pendingOutgoing.indexOf(currentUser);
    if (idx2 !== -1) friendships[userId].pendingOutgoing.splice(idx2, 1);
    friendships[userId].friends.push(currentUser);
    toast(`✅ You're now friends with ${USERS[userId].name}!`);
  } else {
    toast(`✕ Friend request declined`);
  }
  renderFriends();
  updateBadges();
}

// ──────────────────────────────────────────────
//  CHAT
// ──────────────────────────────────────────────

function openChat(friendId) {
  currentChatFriend = friendId;
  const key = [currentUser, friendId].sort().join('-');
  if (!chats[key]) chats[key] = [];

  $('chat-friend-name').textContent = `💬 ${USERS[friendId].name}`;
  renderChatMessages(key);
  $('chat-input-field').value = '';
  $('chat-input-field').focus();
  openModal('modal-chat');
}

function renderChatMessages(key) {
  const messages = chats[key] || [];
  const msgEl = $('chat-messages');
  msgEl.innerHTML = messages.map(msg => `
    <div class="message ${msg.from === currentUser ? 'sent' : 'received'}">
      <div class="msg-bubble">${msg.text}</div>
    </div>
  `).join('');
  msgEl.scrollTop = msgEl.scrollHeight;
}

function sendMessage() {
  const input = $('chat-input-field');
  const text = input.value.trim();
  if (!text) return;

  const key = [currentUser, currentChatFriend].sort().join('-');
  if (!chats[key]) chats[key] = [];

  const now = new Date(TODAY);
  now.setHours(now.getHours() + Math.floor(Math.random() * 5));
  const timeStr = now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });

  chats[key].push({ from:currentUser, text, time:timeStr });
  input.value = '';
  renderChatMessages(key);
}

// ──────────────────────────────────────────────
//  BORROWS SCREEN
// ──────────────────────────────────────────────

let borrowTab = 'active';

function switchBorrowTab(tab) {
  borrowTab = tab;
  $('tab-active').classList.toggle('active', tab==='active');
  $('tab-history').classList.toggle('active', tab==='history');
  $('borrows-active').style.display  = tab==='active'  ? 'block':'none';
  $('borrows-history').style.display = tab==='history' ? 'block':'none';
}

function renderBorrows() {
  const active  = transactions.filter(tx =>
    tx.borrower===currentUser && ['requested','active','pending_return'].includes(tx.status)
  );
  const history = transactions.filter(tx =>
    tx.borrower===currentUser && ['returned','late','lost'].includes(tx.status)
  );
  $('borrows-active').innerHTML  = active.length  ? active.map(borrowCard).join('')  : emptyState('📭','No active borrows.');
  $('borrows-history').innerHTML = history.length ? history.map(borrowCard).join('') : emptyState('📋','No borrow history yet.');
}

function borrowCard(tx) {
  const lender = USERS[tx.lender];
  let actionHTML = '';

  if (tx.status==='requested') {
    actionHTML = `<div style="padding:11px;background:#FFF8E7;border-radius:12px;text-align:center;font-size:13px;color:#C97A00;font-weight:700">
      ⏳ Waiting for ${lender.name} to approve…
    </div>`;
  } else if (tx.status==='active') {
    actionHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        ${dueChip(tx.dueDate)}<span class="badge b-active">✅ Active</span>
      </div>
      <button class="btn btn-outline btn-full" onclick="openReturnModal(${tx.id})">📦 Send Return Request</button>`;
  } else if (tx.status==='pending_return') {
    actionHTML = `<div style="padding:11px;background:#E0F2F1;border-radius:12px;text-align:center;font-size:13px;color:#4A9490;font-weight:700">
      🔄 Waiting for ${lender.name} to confirm return…
    </div>`;
  } else if (tx.status==='returned') {
    actionHTML = `<div style="display:flex;justify-content:space-between;align-items:center">
      <span class="badge b-returned">✔️ Returned on time</span>
      ${tx.conditionRating?`<span style="color:#F59E0B;font-size:14px">${'⭐'.repeat(tx.conditionRating)}</span>`:''}
    </div>`;
  } else if (tx.status==='late') {
    actionHTML = `<div style="display:flex;justify-content:space-between;align-items:center">
      <span class="badge b-late">🔴 Returned Late</span>
      ${tx.conditionRating?`<span style="color:#F59E0B;font-size:14px">${'⭐'.repeat(tx.conditionRating)}</span>`:''}
    </div>`;
  } else if (tx.status==='lost') {
    actionHTML = `<span class="badge b-lost">❌ Marked as Lost</span>`;
  }

  return `
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div class="item-emoji">${tx.itemEmoji}</div>
        <div>
          <div class="item-name">${tx.itemName}</div>
          <div class="item-meta">From ${lender.emoji} ${lender.name}</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="info-row"><span class="info-label">Requested</span><span class="info-value">${fmt(tx.requestedAt)}</span></div>
      <div class="info-row"><span class="info-label">Due date</span><span class="info-value">${fmt(tx.dueDate)}</span></div>
      ${tx.borrowerNote?`<div class="info-row"><span class="info-label">Your note</span><span class="info-value">${tx.borrowerNote}</span></div>`:''}
      ${tx.lenderNotes ?`<div class="info-row"><span class="info-label">Lender note</span><span class="info-value">${tx.lenderNotes}</span></div>`:''}
      <div style="margin-top:12px">${actionHTML}</div>
    </div>`;
}

// ──────────────────────────────────────────────
//  RETURN MODAL
// ──────────────────────────────────────────────

function openReturnModal(txId) {
  const tx   = getTx(txId);
  const simulatedLate = isLate({ ...tx, returnRequestAt:TODAY_STR });

  $('modal-return-body').innerHTML = `
    <div style="background:#F5F5F5;border-radius:14px;padding:14px;margin-bottom:16px">
      <div class="item-row">
        <div class="item-emoji">${tx.itemEmoji}</div>
        <div>
          <div class="item-name">${tx.itemName}</div>
          <div class="item-meta">Due: ${fmt(tx.dueDate)}</div>
          <div style="margin-top:5px">${dueChip(tx.dueDate)}</div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">📸 Photo of item being returned</label>
      <div class="photo-box" onclick="fakePhoto(this)">
        <div class="photo-icon">📷</div>
        <p>Tap to capture photo of item</p>
      </div>
    </div>

    ${simulatedLate
      ? `<div style="padding:12px;background:#FDEAEA;border-radius:12px;font-size:13px;color:#D93030;font-weight:700;margin-bottom:14px">
           ⚠️ Past the due date — this will be marked <strong>Late</strong>.
         </div>`
      : `<div style="padding:12px;background:#E0F5EC;border-radius:12px;font-size:13px;color:#2E9E6B;font-weight:700;margin-bottom:14px">
           ✅ Returning on time — great!
         </div>`
    }

    <p style="font-size:13px;color:var(--text-sub);margin-bottom:16px">
      ${USERS[tx.lender].name} will confirm receipt and rate the condition.
    </p>

    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1;border-radius:25px" onclick="closeModal('modal-return')">Cancel</button>
      <button class="btn btn-primary" style="flex:2" onclick="submitReturn(${txId})">📦 Send Return Request</button>
    </div>`;
  openModal('modal-return');
}

function fakePhoto(el) {
  el.innerHTML = `<div class="photo-icon">✅</div><p style="color:#2E9E6B;font-weight:700">Photo captured!</p>`;
  el.style.borderColor = '#2E9E6B';
  el.style.background  = '#E0F5EC';
  el.onclick = null;
}

function submitReturn(txId) {
  const tx = getTx(txId);
  tx.status          = 'pending_return';
  tx.returnRequestAt = TODAY_STR;
  closeModal('modal-return');
  toast('📦 Return request sent!');
  renderBorrows();
  updateBadges();
}

// ──────────────────────────────────────────────
//  REQUESTS SCREEN
// ──────────────────────────────────────────────

let starRating = {};

function renderRequests() {
  const borrowReqs = transactions.filter(tx => tx.lender===currentUser && tx.status==='requested');
  const returnReqs = transactions.filter(tx => tx.lender===currentUser && tx.status==='pending_return');

  if (!borrowReqs.length && !returnReqs.length) {
    $('requests-list').innerHTML = emptyState('🎉','No pending requests!');
    updateBadges(); return;
  }

  let html = '';

  if (borrowReqs.length) {
    html += `<div style="font-size:11px;font-weight:800;color:rgba(255,255,255,0.7);margin-bottom:10px;text-transform:uppercase;letter-spacing:.8px">Borrow Requests</div>`;
    html += borrowReqs.map(tx => {
      const b    = USERS[tx.borrower];
      return `
        <div class="card">
          <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
            <div class="item-emoji">${tx.itemEmoji}</div>
            <div>
              <div class="item-name">${tx.itemName}</div>
              <div class="item-meta">${b.emoji} ${b.name}</div>
            </div>
          </div>
          <div class="info-row"><span class="info-label">Condition</span><span class="info-value">${tx.itemCondition}</span></div>
          <div class="info-row"><span class="info-label">Return by</span><span class="info-value">${fmt(tx.dueDate)}</span></div>
          ${tx.borrowerNote?`<div class="info-row"><span class="info-label">Note</span><span class="info-value">"${tx.borrowerNote}"</span></div>`:''}
          <div class="req-actions">
            <button class="btn btn-danger btn-sm" style="flex:1"  onclick="respondBorrow(${tx.id},false)">✕ Deny</button>
            <button class="btn btn-success btn-sm" style="flex:2" onclick="respondBorrow(${tx.id},true)">✓ Accept</button>
          </div>
        </div>`;
    }).join('');
  }

  if (returnReqs.length) {
    html += `<div style="font-size:11px;font-weight:800;color:rgba(255,255,255,0.7);margin:8px 0 10px;text-transform:uppercase;letter-spacing:.8px">Return Confirmations</div>`;
    html += returnReqs.map(tx => {
      const b    = USERS[tx.borrower];
      const late = isLate(tx);
      return `
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
            <div style="display:flex;gap:12px;align-items:center">
              <div class="item-emoji">${tx.itemEmoji}</div>
              <div>
                <div class="item-name">${tx.itemName}</div>
                <div class="item-meta">${b.emoji} ${b.name}</div>
              </div>
            </div>
            ${late?`<span class="badge b-late">🔴 Late</span>`:`<span class="badge b-active">✅ On Time</span>`}
          </div>
          <div class="info-row"><span class="info-label">Due date</span><span class="info-value">${fmt(tx.dueDate)}</span></div>
          <div class="info-row"><span class="info-label">Return sent</span><span class="info-value">${fmt(tx.returnRequestAt)}</span></div>

          <div style="margin-top:12px">
            <div class="form-label">Rate item condition</div>
            <div class="star-row" id="stars-${tx.id}">
              ${[1,2,3,4,5].map(n=>`<span class="star" onclick="setStar(${tx.id},${n})">⭐</span>`).join('')}
            </div>
          </div>
          <div class="form-group">
            <input class="form-input" id="lnotes-${tx.id}" type="text" placeholder="Notes about condition (optional)">
          </div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn btn-ghost btn-sm" style="flex:1" onclick="denyReturn(${tx.id})">✕ Reject Return</button>
            <button class="btn btn-success btn-sm" style="flex:2" onclick="confirmReturn(${tx.id})">✓ Confirm Return</button>
          </div>
        </div>`;
    }).join('');
  }

  $('requests-list').innerHTML = html;
  updateBadges();
}

function setStar(txId, rating) {
  starRating[txId] = rating;
  const starEl = $(`stars-${txId}`);
  starEl.querySelectorAll('.star').forEach((s, i) => {
    s.classList.toggle('lit', i < rating);
  });
}

function respondBorrow(txId, accept) {
  const tx = getTx(txId);
  if (accept) {
    tx.status = 'active';
    tx.startDate = TODAY_STR;
    toast(`✅ Borrow request accepted!`);
  } else {
    transactions = transactions.filter(t => t.id !== txId);
    toast(`✕ Borrow request denied.`);
  }
  renderRequests();
}

function confirmReturn(txId) {
  const tx = getTx(txId);
  const rating = starRating[txId] || 0;
  const notes = $(`lnotes-${txId}`).value.trim();
  
  if (rating === 0) {
    toast('⚠️ Please rate the item condition');
    return;
  }

  tx.conditionRating = rating;
  tx.lenderNotes = notes;
  tx.status = isLate(tx) ? 'late' : 'returned';
  tx.returnedAt = TODAY_STR;
  
  toast('✅ Return confirmed!');
  renderRequests();
}

function denyReturn(txId) {
  const tx = getTx(txId);
  tx.status = 'active';
  tx.returnRequestAt = null;
  toast('📦 Return request rejected');
  renderRequests();
}

// ──────────────────────────────────────────────
//  PROFILE SCREEN
// ──────────────────────────────────────────────

function renderProfile() {
  const userTxs = transactions.filter(tx => tx.borrower===currentUser || tx.lender===currentUser);
  const totalTxs = userTxs.length;
  const returned = userTxs.filter(tx => tx.status==='returned').length;
  const late = userTxs.filter(tx => tx.status==='late').length;
  const lost = userTxs.filter(tx => tx.status==='lost').length;

  const successPct = totalTxs ? Math.round((returned / totalTxs) * 100) : 0;
  const latePct    = totalTxs ? Math.round((late / totalTxs) * 100) : 0;
  const lostPct    = totalTxs ? Math.round((lost / totalTxs) * 100) : 0;

  $('profile-content').innerHTML = `
    <div class="avatar-wrap">
      <div class="avatar-emoji">${USERS[currentUser].emoji}</div>
      <div class="avatar-name">${USERS[currentUser].name}</div>
      <div class="avatar-sub">@${currentUser}</div>
    </div>

    <div class="divider"></div>

    <div class="section-title">Reliability Score</div>
    <div class="card">
      <div class="rep-row">
        <div class="rep-header">
          <span>Good Transactions</span>
          <span style="color:var(--success);font-weight:900">${successPct}%</span>
        </div>
        <div class="rep-bar">
          <div class="rep-fill" style="width:${successPct}%;background:var(--success)"></div>
        </div>
      </div>

      <div class="rep-row">
        <div class="rep-header">
          <span>Late Returns</span>
          <span style="color:var(--warning);font-weight:900">${latePct}%</span>
        </div>
        <div class="rep-bar">
          <div class="rep-fill" style="width:${latePct}%;background:var(--warning)"></div>
        </div>
      </div>

      <div class="rep-row">
        <div class="rep-header">
          <span>Lost Items</span>
          <span style="color:var(--danger);font-weight:900">${lostPct}%</span>
        </div>
        <div class="rep-bar">
          <div class="rep-fill" style="width:${lostPct}%;background:var(--danger)"></div>
        </div>
      </div>
    </div>

    <div class="section-title" style="margin-top:20px">Transaction History</div>
    <div class="card">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number">${totalTxs}</div>
          <div class="stat-label">Total Transactions</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${returned}</div>
          <div class="stat-label">On Time</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${late}</div>
          <div class="stat-label">Late</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${lost}</div>
          <div class="stat-label">Lost</div>
        </div>
      </div>
    </div>
  `;
}

// Initialize
render('friends');
</script>
</body>
</html>
