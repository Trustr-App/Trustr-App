<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trustr</title>
  <style>
    :root {
      --primary:       #7C3AED;
      --primary-light: #EDE9FE;
      --success:       #16A34A;
      --success-light: #DCFCE7;
      --warning:       #D97706;
      --warning-light: #FEF3C7;
      --danger:        #DC2626;
      --danger-light:  #FEE2E2;
      --gray:          #6B7280;
      --gray-light:    #F3F4F6;
      --text:          #111827;
      --text-sub:      #6B7280;
      --bg:            #F5F3FF;
      --card:          #FFFFFF;
      --border:        #E5E7EB;
      --nav-h:         64px;
      --hdr-h:         60px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────── */
    .header {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; height: var(--hdr-h);
      background: white; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }
    .logo { font-size: 24px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }
    .logo span { color: #A78BFA; }

    .user-switcher { display: flex; background: var(--gray-light); border-radius: 20px; padding: 3px; gap: 2px; }
    .user-btn {
      padding: 5px 13px; border-radius: 16px; border: none;
      background: transparent; font-size: 13px; font-weight: 600;
      color: var(--gray); cursor: pointer; transition: all 0.2s;
    }
    .user-btn.active { background: var(--primary); color: white; }

    /* ── CONTENT ─────────────────────────────── */
    .content {
      padding-top: calc(var(--hdr-h) + 20px);
      padding-bottom: calc(var(--nav-h) + 20px);
      padding-left: 16px; padding-right: 16px;
    }

    /* ── BOTTOM NAV ──────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; height: var(--nav-h);
      background: white; border-top: 1px solid var(--border);
      display: flex; z-index: 100;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; cursor: pointer;
      border: none; background: transparent; color: var(--gray);
      font-size: 11px; font-weight: 600; transition: color 0.2s; position: relative;
    }
    .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-badge {
      position: absolute; top: 6px; right: calc(50% - 18px);
      background: var(--danger); color: white; font-size: 10px; font-weight: 800;
      min-width: 17px; height: 17px; border-radius: 9px; padding: 0 4px;
      display: none; align-items: center; justify-content: center;
      border: 2px solid white;
    }

    /* ── SCREENS ─────────────────────────────── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── SECTION TITLE ───────────────────────── */
    .section-title { font-size: 20px; font-weight: 800; margin-bottom: 16px; }

    /* ── CARDS ───────────────────────────────── */
    .card {
      background: var(--card); border-radius: 18px; padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 12px;
    }

    /* ── STATUS BADGES ───────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 11px; border-radius: 20px; font-size: 12px; font-weight: 700;
    }
    .b-requested      { background: var(--warning-light); color: var(--warning); }
    .b-active         { background: var(--success-light);  color: var(--success); }
    .b-pending_return { background: var(--primary-light);  color: var(--primary); }
    .b-returned       { background: var(--gray-light);     color: var(--gray); }
    .b-late           { background: var(--danger-light);   color: var(--danger); }
    .b-lost           { background: #1F2937;               color: white; }

    /* ── BUTTONS ─────────────────────────────── */
    .btn {
      padding: 11px 16px; border-radius: 13px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.15s; display: inline-flex; align-items: center;
      justify-content: center; gap: 6px; font-family: inherit;
    }
    .btn:active { transform: scale(0.96); opacity: 0.9; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger  { background: var(--danger);  color: white; }
    .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
    .btn-ghost   { background: var(--gray-light); color: var(--text); }
    .btn-full    { width: 100%; }
    .btn-sm      { padding: 8px 13px; font-size: 13px; }

    /* ── FORM ────────────────────────────────── */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 13px;
      font-size: 15px; outline: none; transition: border-color 0.2s;
      font-family: inherit; color: var(--text); background: white;
    }
    .form-input:focus { border-color: var(--primary); }

    /* ── TABS ────────────────────────────────── */
    .tabs {
      display: flex; gap: 0; margin-bottom: 16px;
      background: var(--gray-light); border-radius: 13px; padding: 3px;
    }
    .tab {
      flex: 1; padding: 9px; text-align: center; border: none;
      background: transparent; border-radius: 10px;
      font-size: 13px; font-weight: 700; color: var(--gray);
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .tab.active { background: white; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    /* ── INFO ROWS ───────────────────────────── */
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--gray-light);
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-sub); }
    .info-value { font-weight: 700; text-align: right; max-width: 60%; }

    /* ── DIVIDER ─────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    /* ── FLOW STEPS ──────────────────────────── */
    .flow-steps { display: flex; align-items: flex-start; margin: 4px 0 12px; }
    .flow-step  { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .flow-dot {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--gray-light); color: var(--gray);
      font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; z-index: 1;
    }
    .flow-dot.done    { background: var(--success); color: white; font-size: 14px; }
    .flow-dot.current { background: var(--primary); color: white; }
    .flow-dot.late    { background: var(--danger);  color: white; font-size: 14px; }
    .flow-dot.lost    { background: #1F2937;         color: white; font-size: 14px; }
    .flow-line { flex: 1; height: 2px; background: var(--border); margin-top: 13px; }
    .flow-line.done   { background: var(--success); }
    .flow-label { font-size: 10px; color: var(--gray); font-weight: 600; text-align: center; line-height: 1.2; }
    .flow-label.active-label { color: var(--primary); font-weight: 800; }
    .flow-label.done-label   { color: var(--success); }

    /* ── EMPTY STATE ─────────────────────────── */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-sub); }
    .empty-icon  { font-size: 52px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; font-weight: 500; }

    /* ── ITEM CARD ───────────────────────────── */
    .item-row { display: flex; align-items: center; gap: 14px; }
    .item-emoji {
      font-size: 32px; width: 56px; height: 56px;
      background: var(--primary-light); border-radius: 14px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .item-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .item-meta { font-size: 13px; color: var(--text-sub); margin-top: 1px; }

    /* ── STATS GRID ──────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card  { border-radius: 16px; padding: 16px; text-align: center; }
    .stat-number { font-size: 30px; font-weight: 900; }
    .stat-label  { font-size: 11px; color: var(--gray); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }

    /* ── REP BAR ─────────────────────────────── */
    .rep-row { margin-bottom: 12px; }
    .rep-header { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
    .rep-bar { background: var(--gray-light); border-radius: 8px; height: 8px; overflow: hidden; }
    .rep-fill { height: 100%; border-radius: 8px; transition: width 0.6s ease; }

    /* ── PHOTO BOX ───────────────────────────── */
    .photo-box {
      background: var(--gray-light); border-radius: 13px; padding: 22px 16px;
      text-align: center; color: var(--gray); cursor: pointer;
      border: 2px dashed var(--border); transition: all 0.2s;
    }
    .photo-box:hover { border-color: var(--primary); background: var(--primary-light); }
    .photo-box .photo-icon { font-size: 36px; margin-bottom: 6px; }
    .photo-box p { font-size: 13px; font-weight: 600; }

    /* ── MODAL ───────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 24px 24px 0 0;
      padding: 8px 20px 28px; width: 100%; max-width: 430px;
      max-height: 88vh; overflow-y: auto;
    }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
    .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 18px; }

    /* ── TOAST ───────────────────────────────── */
    .toast {
      position: fixed; bottom: calc(var(--nav-h) + 12px);
      left: 50%; transform: translateX(-50%) translateY(12px);
      background: #1F2937; color: white; padding: 12px 20px;
      border-radius: 14px; font-size: 14px; font-weight: 600;
      z-index: 300; opacity: 0; transition: all 0.28s;
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── STARS ───────────────────────────────── */
    .star-row { display: flex; gap: 6px; margin: 6px 0 12px; }
    .star { font-size: 28px; cursor: pointer; opacity: 0.25; transition: opacity 0.15s, transform 0.1s; user-select: none; }
    .star.lit { opacity: 1; }
    .star:active { transform: scale(1.3); }

    /* ── DUE CHIP ────────────────────────────── */
    .due-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 10px; }
    .due-ok   { background: var(--success-light); color: var(--success); }
    .due-soon { background: var(--warning-light);  color: var(--warning); }
    .due-over { background: var(--danger-light);   color: var(--danger); }

    /* ── LEND ITEM LIST ──────────────────────── */
    .lent-item-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--gray-light);
    }
    .lent-item-row:last-child { border-bottom: none; }
    .avail-chip { font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 9px; white-space: nowrap; }
  </style>
</head>
<body>

<!-- ════════ HEADER ════════ -->
<div class="header">
  <div class="logo">Tru<span>str</span></div>
  <div class="user-switcher">
    <button class="user-btn active" onclick="switchUser('alex')">👦 Alex</button>
    <button class="user-btn"        onclick="switchUser('jordan')">👧 Jordan</button>
  </div>
</div>

<!-- ════════ CONTENT ════════ -->
<div class="content">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="section-title">Browse Items 🛍️</div>
    <div id="home-list"></div>
  </div>

  <!-- MY BORROWS -->
  <div class="screen" id="screen-borrows">
    <div class="section-title">My Borrows 📦</div>
    <div class="tabs">
      <button class="tab active" id="tab-active"   onclick="switchBorrowTab('active')">Active</button>
      <button class="tab"        id="tab-history"  onclick="switchBorrowTab('history')">History</button>
    </div>
    <div id="borrows-active"></div>
    <div id="borrows-history" style="display:none"></div>
  </div>

  <!-- LEND -->
  <div class="screen" id="screen-lend">
    <div class="section-title">Lend an Item 🤝</div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">Item Name</label>
        <input class="form-input" id="lend-name" type="text" placeholder="e.g. Scientific Calculator">
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-input" id="lend-emoji">
          <option value="🔢">🔢 Calculator</option>
          <option value="📚">📚 Book</option>
          <option value="🎧">🎧 Headphones</option>
          <option value="🔌">🔌 Charger / Cable</option>
          <option value="✏️">✏️ Stationery</option>
          <option value="💻">💻 Electronics</option>
          <option value="📐">📐 Tools / Instruments</option>
          <option value="📦">📦 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Condition</label>
        <select class="form-input" id="lend-condition">
          <option>Like New</option>
          <option>Good</option>
          <option>Fair</option>
          <option>Worn</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <input class="form-input" id="lend-notes" type="text" placeholder="Any details about the item…">
      </div>
      <button class="btn btn-primary btn-full" onclick="listItem()">+ List Item for Lending</button>
    </div>

    <div class="section-title" style="margin-top:4px">My Listed Items</div>
    <div id="my-items-list"></div>
  </div>

  <!-- REQUESTS -->
  <div class="screen" id="screen-requests">
    <div class="section-title">Requests 📬</div>
    <div id="requests-list"></div>
  </div>

  <!-- PROFILE -->
  <div class="screen" id="screen-profile">
    <div class="section-title">Profile 👤</div>
    <div id="profile-content"></div>
  </div>

</div>

<!-- ════════ BOTTOM NAV ════════ -->
<div class="bottom-nav">
  <button class="nav-item active" id="nav-home"     onclick="navigate('home')">
    <span class="nav-icon">🏠</span><span>Browse</span>
  </button>
  <button class="nav-item"        id="nav-borrows"  onclick="navigate('borrows')">
    <span class="nav-icon">📦</span><span>Borrows</span>
  </button>
  <button class="nav-item"        id="nav-lend"     onclick="navigate('lend')">
    <span class="nav-icon">🤝</span><span>Lend</span>
  </button>
  <button class="nav-item"        id="nav-requests" onclick="navigate('requests')">
    <span class="nav-icon">📬</span><span>Requests</span>
    <span class="nav-badge" id="req-badge">0</span>
  </button>
  <button class="nav-item"        id="nav-profile"  onclick="navigate('profile')">
    <span class="nav-icon">👤</span><span>Profile</span>
  </button>
</div>

<!-- ════════ MODAL: BORROW REQUEST ════════ -->
<div class="modal-overlay" id="modal-borrow">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Request to Borrow</div>
    <div id="modal-borrow-body"></div>
  </div>
</div>

<!-- ════════ MODAL: RETURN REQUEST ════════ -->
<div class="modal-overlay" id="modal-return">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Send Return Request</div>
    <div id="modal-return-body"></div>
  </div>
</div>

<!-- ════════ TOAST ════════ -->
<div class="toast" id="toast"></div>

<script>
// ──────────────────────────────────────────────
//  DATA
// ──────────────────────────────────────────────

const USERS = {
  alex:   { id: 'alex',   name: 'Alex',   emoji: '👦' },
  jordan: { id: 'jordan', name: 'Jordan', emoji: '👧' }
};

// Demo date: June 10 2026
const TODAY     = new Date('2026-06-10T00:00:00');
const TODAY_STR = '2026-06-10';

let currentUser = 'alex';

let items = [
  { id: 1, name: 'Scientific Calculator', owner: 'jordan', emoji: '🔢', condition: 'Good',     notes: 'Works perfectly, small scratch on back', available: true  },
  { id: 2, name: 'USB-C Charger (65W)',   owner: 'jordan', emoji: '🔌', condition: 'Like New', notes: '',                                        available: true  },
  { id: 3, name: 'Noise-Cancelling Headphones', owner: 'jordan', emoji: '🎧', condition: 'Good', notes: 'Right ear-pad slightly worn',           available: false },
  { id: 4, name: 'Physics Textbook',      owner: 'jordan', emoji: '📚', condition: 'Fair',     notes: 'Highlighting in chapter 3',               available: true  },
  { id: 5, name: 'Ruler & Compass Set',   owner: 'alex',   emoji: '📐', condition: 'Good',     notes: '',                                        available: true  },
];
let nextItemId = 6;

// Status flow: requested → active → pending_return → returned | late | lost
let transactions = [
  {
    id: 1, itemId: 3,
    borrower: 'alex', lender: 'jordan',
    status: 'active',
    requestedAt: '2026-06-08', startDate: '2026-06-09', dueDate: '2026-06-14',
    returnRequestAt: null, returnedAt: null,
    conditionRating: null, lenderNotes: '',
    borrowerNote: 'Need it for finals week'
  },
  {
    id: 2, itemId: 5,
    borrower: 'jordan', lender: 'alex',
    status: 'returned',
    requestedAt: '2026-06-01', startDate: '2026-06-02', dueDate: '2026-06-07',
    returnRequestAt: '2026-06-06', returnedAt: '2026-06-07',
    conditionRating: 5, lenderNotes: 'Perfect condition, returned early!',
    borrowerNote: 'Just for one project'
  }
];
let nextTxId = 3;

// ──────────────────────────────────────────────
//  HELPERS
// ──────────────────────────────────────────────

const $ = id => document.getElementById(id);

function toast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

function closeModal(id) { $(id).classList.remove('open'); }
function openModal(id)  { $(id).classList.add('open');    }

document.querySelectorAll('.modal-overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); })
);

function fmt(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function dueChip(dueDateStr) {
  const due  = new Date(dueDateStr + 'T23:59:59');
  const diff = Math.ceil((due - TODAY) / 864e5);
  if (diff < 0)   return `<span class="due-chip due-over">🔴 ${Math.abs(diff)}d overdue</span>`;
  if (diff === 0) return `<span class="due-chip due-soon">⚠️ Due today</span>`;
  if (diff <= 3)  return `<span class="due-chip due-soon">⚡ ${diff}d left</span>`;
  return              `<span class="due-chip due-ok">📅 ${diff}d left</span>`;
}

// Late rule:
//   On time  → return request sent on or before midnight of due date
//   Late     → return request sent after midnight OR never sent and today > due date
function isLate(tx) {
  const due = new Date(tx.dueDate + 'T23:59:59');
  if (!tx.returnRequestAt) return TODAY > due;
  return new Date(tx.returnRequestAt + 'T23:59:59') > due;
}

function getItem(id) { return items.find(i => i.id === id); }
function getTx(id)   { return transactions.find(t => t.id === id); }

function pendingCount(userId) {
  return transactions.filter(tx =>
    tx.lender === userId &&
    (tx.status === 'requested' || tx.status === 'pending_return')
  ).length;
}

function updateBadge() {
  const n  = pendingCount(currentUser);
  const el = $('req-badge');
  el.textContent = n;
  el.style.display = n > 0 ? 'flex' : 'none';
}

function emptyState(icon, msg) {
  return `<div class="empty-state"><div class="empty-icon">${icon}</div><p>${msg}</p></div>`;
}

// ──────────────────────────────────────────────
//  NAVIGATION
// ──────────────────────────────────────────────

let currentScreen = 'home';

function navigate(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  $('screen-' + screen).classList.add('active');
  $('nav-'    + screen).classList.add('active');
  currentScreen = screen;
  render(screen);
}

function render(screen) {
  if (screen === 'home')     renderHome();
  if (screen === 'borrows')  renderBorrows();
  if (screen === 'lend')     renderLend();
  if (screen === 'requests') renderRequests();
  if (screen === 'profile')  renderProfile();
  updateBadge();
}

function switchUser(uid) {
  currentUser = uid;
  document.querySelectorAll('.user-btn').forEach((b, i) =>
    b.classList.toggle('active',
      (i === 0 && uid === 'alex') || (i === 1 && uid === 'jordan')
    )
  );
  render(currentScreen);
}

// ──────────────────────────────────────────────
//  FLOW STEPS WIDGET
// ──────────────────────────────────────────────

function flowSteps(tx) {
  const terminal = ['returned','late','lost'].includes(tx.status);
  const STEPS = [
    { key: 'requested',      label: 'Requested' },
    { key: 'active',         label: 'Active' },
    { key: 'pending_return', label: 'Returning' },
    { key: 'done',           label: tx.status === 'lost' ? 'Lost' : tx.status === 'late' ? 'Late' : 'Done' }
  ];
  const ORDER  = ['requested','active','pending_return','returned','late','lost'];
  const curIdx = ORDER.indexOf(tx.status);

  let html = '<div class="flow-steps">';
  STEPS.forEach((step, i) => {
    const stepOrdIdx = i < 3 ? i : 3; // steps 0-2 map directly; step 3 = "done" group
    const past    = (i < 3) && (curIdx > i);
    const isLast  = i === 3;
    const isDone  = past || (isLast && terminal);
    const isCur   = !terminal && curIdx === i;

    let dotClass = '';
    let dotInner = i + 1;
    if (past)   { dotClass = 'done'; dotInner = '✓'; }
    if (isLast && terminal) {
      if (tx.status === 'returned') { dotClass = 'done'; dotInner = '✓'; }
      if (tx.status === 'late')     { dotClass = 'late'; dotInner = '⚠'; }
      if (tx.status === 'lost')     { dotClass = 'lost'; dotInner = '✕'; }
    }
    if (isCur)  { dotClass = 'current'; }

    const lblClass = (isCur || (isLast && terminal)) ? 'active-label' : past ? 'done-label' : '';

    html += `<div class="flow-step">
      <div class="flow-dot ${dotClass}">${dotInner}</div>
      <div class="flow-label ${lblClass}">${step.label}</div>
    </div>`;
    if (i < 3) html += `<div class="flow-line ${past ? 'done' : ''}"></div>`;
  });
  html += '</div>';
  return html;
}

function borrowCard(tx) {
  const item   = getItem(tx.itemId);
  const lender = USERS[tx.lender];
  let actionHTML = '';

  if (tx.status === 'requested') {
    actionHTML = `
      <div style="padding:12px;background:var(--warning-light);border-radius:12px;text-align:center;font-size:13px;color:#92400E;font-weight:600">
        ⏳ Waiting for ${lender.name} to approve…
      </div>`;
  } else if (tx.status === 'active') {
    actionHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        ${dueChip(tx.dueDate)}
        <span class="badge b-active">✅ Active</span>
      </div>
      <button class="btn btn-outline btn-full" onclick="openReturnModal(${tx.id})">📦 Send Return Request</button>`;
  } else if (tx.status === 'pending_return') {
    actionHTML = `
      <div style="padding:12px;background:var(--primary-light);border-radius:12px;text-align:center;font-size:13px;color:var(--primary);font-weight:600">
        🔄 Waiting for ${lender.name} to confirm return…
      </div>`;
  } else if (tx.status === 'returned') {
    actionHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="badge b-returned">✔️ Returned on time</span>
        ${tx.conditionRating ? `<span style="color:#F59E0B;font-size:15px">${'⭐'.repeat(tx.conditionRating)}</span>` : ''}
      </div>`;
  } else if (tx.status === 'late') {
    actionHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="badge b-late">🔴 Returned Late</span>
        ${tx.conditionRating ? `<span style="color:#F59E0B;font-size:15px">${'⭐'.repeat(tx.conditionRating)}</span>` : ''}
      </div>`;
  } else if (tx.status === 'lost') {
    actionHTML = `<span class="badge b-lost">❌ Marked as Lost</span>`;
  }

  return `
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div class="item-emoji">${item.emoji}</div>
        <div>
          <div class="item-name">${item.name}</div>
          <div class="item-meta">From ${lender.emoji} ${lender.name}</div>
        </div>
      </div>
      ${flowSteps(tx)}
      <div class="divider"></div>
      <div class="info-row"><span class="info-label">Requested</span><span class="info-value">${fmt(tx.requestedAt)}</span></div>
      <div class="info-row"><span class="info-label">Due date</span><span class="info-value">${fmt(tx.dueDate)}</span></div>
      ${tx.borrowerNote ? `<div class="info-row"><span class="info-label">Your note</span><span class="info-value">${tx.borrowerNote}</span></div>` : ''}
      ${tx.lenderNotes  ? `<div class="info-row"><span class="info-label">Lender note</span><span class="info-value">${tx.lenderNotes}</span></div>` : ''}
      <div style="margin-top:12px">${actionHTML}</div>
    </div>
  `;
}

            <button class="btn btn-success btn-sm" style="flex:2" onclick="respondBorrow(${tx.id}, true)">✓ Accept</button>
          </div>
        </div>
      `;
    }).join('');
  }

  if (returnReqs.length) {
    html += `<div style="font-size:12px;font-weight:800;color:var(--text-sub);margin:8px 0 10px;text-transform:uppercase;letter-spacing:.8px">Return Confirmations</div>`;
    html += returnReqs.map(tx => {
      const item = getItem(tx.itemId);
      const b    = USERS[tx.borrower];
      const late = isLate(tx);
      return `
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
            <div style="display:flex;gap:12px;align-items:center">
              <div class="item-emoji">${item.emoji}</div>
              <div>
                <div class="item-name">${item.name}</div>
                <div class="item-meta">${b.emoji} ${b.name} is returning this</div>
              </div>
            </div>
            ${late
              ? `<span class="badge b-late">🔴 Late</span>`
              : `<span class="badge b-active">✅ On Time</span>`
            }
          </div>
          <div class="info-row"><span class="info-label">Due date</span><span class="info-value">${fmt(tx.dueDate)}</span></div>
          <div class="info-row"><span class="info-label">Return sent</span><span class="info-value">${fmt(tx.returnRequestAt)}</span></div>

          <div style="margin-top:14px">
            <div class="form-label">Rate item condition</div>
            <div class="star-row" id="stars-${tx.id}">
              ${[1,2,3,4,5].map(n =>
                `<span class="star" onclick="setStar(${tx.id}, ${n})">⭐</span>`
              ).join('')}
            </div>
          </div>

            <input class="form-input" id="lnotes-${tx.id}" type="text" placeholder="Notes about condition (optional)">

            <button class="btn btn-danger btn-sm"  style="flex:1"  onclick="confirmReturn(${tx.id}, 'lost')">❌ Mark Lost</button>

          </div>
        </div>
      `;
    }).join('');

  $('requests-list').innerHTML = html;

function setStar(txId, rating) {
  starRating[txId] = rating;
  document.querySelectorAll(`#stars-${txId} .star`).forEach((s, i) =>
    s.classList.toggle('lit', i < rating)
  );
}

function respondBorrow(txId, accept) {
  const tx = getTx(txId);
  if (accept) {
    tx.status    = 'active';
    tx.startDate = TODAY_STR;
    toast('✅ Borrow approved!');
  } else {
    tx.status = 'returned'; // cancelled — re-open item
    getItem(tx.itemId).available = true;
    toast('✕ Borrow request denied.');
  }
  renderRequests();
  updateBadge();
}

function confirmReturn(txId, outcome) {
  const tx   = getTx(txId);
  const item = getItem(tx.itemId);
  const notes  = $('lnotes-' + txId)?.value || '';
  const rating = starRating[txId] || null;
  const late   = isLate(tx);

  if (outcome === 'returned') {
    tx.status          = late ? 'late' : 'returned';
    tx.returnedAt      = TODAY_STR;
    tx.conditionRating = rating;
    tx.lenderNotes     = notes;
    item.available     = true;
    toast(late ? '🔴 Confirmed — marked as late return.' : '✅ Return confirmed!');
  } else {
    tx.status      = 'lost';
    tx.lenderNotes = notes;
    toast('❌ Item marked as lost.');
  }

  delete starRating[txId];
  renderRequests();
  updateBadge();
}
